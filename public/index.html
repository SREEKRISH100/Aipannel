<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbot Token Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-logo">
        <div class="logo-icon">⚡</div>
        <h1>Tenant Token Control Panel</h1>
      </div>
      <div class="header-actions">
        <button id="refreshBtn" class="btn btn-secondary">
          <span class="btn-icon">🔄</span> Refresh Stats
        </button>
      </div>
    </header>

    <main class="app-main">
      <!-- Clients Grid -->
      <section class="section">
        <h2 class="section-title">Active Clients (Tenants)</h2>
        <div id="clientsGrid" class="projects-grid">
          <div class="loading-spinner">Loading clients...</div>
        </div>
      </section>

      <!-- Manage & Config Panel -->
      <div class="layout-columns">
        <section class="section column-left">
          <h2 class="section-title">Configure Client Limits</h2>
          <div class="card form-card">
            <form id="configForm">
              <div class="form-group">
                <label for="clientSelector">Select Client</label>
                <select id="clientSelector" required>
                  <option value="" disabled selected>Choose a client...</option>
                </select>
              </div>
              <div id="newClientFields" style="display: none;">
                <div class="form-group">
                  <label for="newClientIdInput">New Client ID (Unique, e.g. client_acme)</label>
                  <input type="text" id="newClientIdInput" placeholder="e.g. client_acme" pattern="^[a-zA-Z0-9-_]+$">
                </div>
                <div class="form-group">
                  <label for="newClientNameInput">New Client Name</label>
                  <input type="text" id="newClientNameInput" placeholder="e.g. Acme Corp">
                </div>
              </div>
              <div class="form-group">
                <label for="tokenLimitInput">Token Limit</label>
                <input type="number" id="tokenLimitInput" placeholder="e.g. 1000000" required>
              </div>
              <div class="form-group">
                <label for="resetCycleInput">Reset Cycle</label>
                <select id="resetCycleInput" required>
                  <option value="monthly" selected>Monthly</option>
                  <option value="yearly">Yearly</option>
                  <option value="none">None (No reset)</option>
                </select>
              </div>
              <div class="form-group-checkbox">
                <input type="checkbox" id="clientActiveInput" checked>
                <label for="clientActiveInput">Client Active & Enabled</label>
              </div>
              <button type="submit" id="submitConfigBtn" class="btn btn-primary">Update Configuration</button>
            </form>
          </div>
        </section>

        <!-- Audit Logs -->
        <section class="section column-right">
          <h2 class="section-title">Completions Audit Logs</h2>
          <div class="card table-card">
            <div class="table-wrapper">
              <table class="audit-table">
                <thead>
                  <tr>
                    <th>Client</th>
                    <th>Tokens</th>
                    <th>Model</th>
                    <th>Time</th>
                  </tr>
                </thead>
                <tbody id="logsBody">
                  <tr>
                    <td colspan="4" class="no-logs">Loading logs...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
