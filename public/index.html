<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbot Token Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-logo">
        <div class="logo-icon">⚡</div>
        <h1>Token Control Panel</h1>
      </div>
      <div class="header-actions">
        <button id="refreshBtn" class="btn btn-secondary">
          <span class="btn-icon">🔄</span> Refresh Stats
        </button>
      </div>
    </header>

    <main class="app-main">
      <!-- Projects Grid -->
      <section class="section">
        <h2 class="section-title">Active Projects</h2>
        <div id="projectsGrid" class="projects-grid">
          <div class="loading-spinner">Loading projects...</div>
        </div>
      </section>

      <!-- Manage & Config Panel -->
      <div class="layout-columns">
        <section class="section column-left">
          <h2 class="section-title">Configure Limits</h2>
          <div class="card form-card">
            <form id="configForm">
              <div class="form-group">
                <label for="projectSelector">Select Project</label>
                <select id="projectSelector" required>
                  <option value="" disabled selected>Choose a project...</option>
                </select>
              </div>
              <div id="newProjectFields" style="display: none;">
                <div class="form-group">
                  <label for="newProjectIdInput">New Project ID (Unique, e.g. custom-app)</label>
                  <input type="text" id="newProjectIdInput" placeholder="e.g. translation-app"
                    pattern="^[a-zA-Z0-9-_]+$">
                </div>
                <div class="form-group">
                  <label for="newProjectNameInput">New Project Name</label>
                  <input type="text" id="newProjectNameInput" placeholder="e.g. Translation App">
                </div>
              </div>
              <div class="form-group">
                <label for="tokenLimitInput">Token Limit</label>
                <input type="number" id="tokenLimitInput" placeholder="e.g. 1000000" required>
              </div>
              <div class="form-group-checkbox">
                <input type="checkbox" id="projectActiveInput" checked>
                <label for="projectActiveInput">Project Active & Enabled</label>
              </div>
              <button type="submit" id="submitConfigBtn" class="btn btn-primary">Update Configuration</button>
            </form>
          </div>
        </section>

        <!-- Audit Logs -->
        <section class="section column-right">
          <h2 class="section-title">Completions Audit Logs</h2>
          <div class="card table-card">
            <div class="table-wrapper">
              <table class="audit-table">
                <thead>
                  <tr>
                    <th>Project</th>
                    <th>Tokens</th>
                    <th>Model</th>
                    <th>Time</th>
                  </tr>
                </thead>
                <tbody id="logsBody">
                  <tr>
                    <td colspan="4" class="no-logs">Loading logs...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>

</html>
