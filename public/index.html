<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbot Token Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-logo">
        <div class="logo-icon">⚡</div>
        <h1>Token Control Panel</h1>
      </div>
      <div class="header-actions">
        <button id="refreshBtn" class="btn btn-secondary">
          <span class="btn-icon">🔄</span> Refresh Stats
        </button>
      </div>
    </header>

    <main class="app-main">
      <!-- Projects Grid -->
      <section class="section">
        <h2 class="section-title">Active Projects</h2>
        <div id="projectsGrid" class="projects-grid">
          <div class="loading-spinner">Loading projects...</div>
        </div>
      </section>

      <!-- Manage & Config Panel -->
      <div class="layout-columns">
        <section class="section column-left">
          <h2 class="section-title">Configure Limits</h2>
          <div class="card form-card">
            <form id="configForm">
              <div class="form-group">
                <label for="projectSelector">Select Project</label>
                <select id="projectSelector" required>
                  <option value="" disabled selected>Choose a project...</option>
                </select>
              </div>
              <div class="form-group">
                <label for="tokenLimitInput">Token Limit</label>
                <input type="number" id="tokenLimitInput" placeholder="e.g. 1000000" required>
              </div>
              <div class="form-group-checkbox">
                <input type="checkbox" id="projectActiveInput" checked>
                <label for="projectActiveInput">Project Active & Enabled</label>
              </div>
              <button type="submit" class="btn btn-primary">Update Configuration</button>
            </form>
          </div>
        </section>

        <!-- Audit Logs -->
        <section class="section column-right">
          <div class="section-header-row">
            <h2 class="section-title">Completions Audit Logs</h2>
            <select id="logFilter" class="filter-select">
              <option value="all">All Projects</option>
            </select>
          </div>
          <div class="card table-card">
            <div class="table-wrapper">
              <table class="audit-table">
                <thead>
                  <tr>
                    <th>Project</th>
                    <th>Tokens</th>
                    <th>Model</th>
                    <th>Time</th>
                  </tr>
                </thead>
                <tbody id="logsBody">
                  <tr>
                    <td colspan="4" class="no-logs">Loading logs...</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="table-footer">
              <span id="pageInfo">Showing 0-0 of 0 logs</span>
              <div class="pagination-actions">
                <button type="button" id="prevPageBtn" class="btn btn-secondary btn-sm">Prev</button>
                <button type="button" id="nextPageBtn" class="btn btn-secondary btn-sm">Next</button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>

</html>
